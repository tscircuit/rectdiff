 data-y="-32.8125" x="499.2" y="1182.3" width="100.80000000000001" height="22.399999999999864" fill="#dbeafe" stroke="black" stroke-width="0.044642857142857144"/></g><g><rect data-type="rect" data-label="node" data-x="2.5" data-y="-27.8125" x="40" y="980.6999999999999" width="560" height="201.60000000000002" fill="#dbeafe" stroke="black" stroke-width="0.044642857142857144"/></g><g><rect data-type="rect" data-label="node" data-x="-0.25" data-y="-22.8125" x="40" y="958.3" width="436.79999999999995" height="22.399999999999977" fill="#dbeafe" stroke="black" stroke-width="0.044642857142857144"/></g><g><rect data-type="rect" data-label="node" data-x="12.75" data-y="-22.8125" x="499.2" y="958.3" width="100.80000000000001" height="22.399999999999977" fill="#dbeafe" stroke="black" stroke-width="0.044642857142857144"/></g><g><rect data-type="rect" data-label="node" data-x="2.5" data-y="-20.0625" x="40" y="857.5" width="560" height="100.79999999999995" fill="#dbeafe" stroke="black" stroke-width="0.044642857142857144"/></g><text data-type="text" data-label="Layer z=0" data-x="0" data-y="15.75" x="264" y="105.70000000000005" fill="black" font-size="11.2" font-family="sans-serif" text-anchor="end" dominant-baseline="text-before-edge">Layer z=0</text><text data-type="text" data-label="Layer z=1" data-x="0" data-y="-17.0625" x="264" y="840.7" fill="black" font-size="11.2" font-family="sans-serif" text-anchor="end" dominant-baseline="text-before-edge">Layer z=1</text><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="1512" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '1512');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":22.4,"c":0,"e":264,"b":0,"d":-22.4,"f":458.5};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>