857144"/></g><g><rect data-type="rect" data-label="node" data-x="10" data-y="-24.33333333333333" x="476.79999999999995" y="1042.1" width="22.400000000000034" height="100.79999999999995" fill="#dbeafe" stroke="black" stroke-width="0.044642857142857144"/></g><g><rect data-type="rect" data-label="node" data-x="0" data-y="-42.33333333333333" x="252.8" y="1389.2999999999997" width="22.399999999999977" height="212.79999999999995" fill="#dbeafe" stroke="black" stroke-width="0.044642857142857144"/></g><g><rect data-type="rect" data-label="node" data-x="0" data-y="-29.33333333333333" x="252.8" y="1042.1" width="22.399999999999977" height="324.79999999999995" fill="#dbeafe" stroke="black" stroke-width="0.044642857142857144"/></g><g><rect data-type="rect" data-label="node" data-x="-5" data-y="-42.08333333333333" x="140.8" y="1478.9" width="22.399999999999977" height="22.399999999999864" fill="#fef3c7" stroke="black" stroke-width="0.044642857142857144"/></g><g><rect data-type="rect" data-label="node" data-x="0" data-y="-37.08333333333333" x="252.8" y="1366.8999999999999" width="22.399999999999977" height="22.40000000000009" fill="#fef3c7" stroke="black" stroke-width="0.044642857142857144"/></g><g><rect data-type="rect" data-label="node" data-x="10" data-y="-37.08333333333333" x="476.79999999999995" y="1366.8999999999999" width="22.400000000000034" height="22.40000000000009" fill="#fef3c7" stroke="black" stroke-width="0.044642857142857144"/></g><g><rect data-type="rect" data-label="node" data-x="10" data-y="-27.08333333333333" x="476.79999999999995" y="1142.8999999999999" width="22.400000000000034" height="22.40000000000009" fill="#fef3c7" stroke="black" stroke-width="0.044642857142857144"/></g><text data-type="text" data-label="Layer z=0" data-x="0" data-y="19.166666666666664" x="264" y="118.10000000000014" fill="black" font-size="11.2" font-family="sans-serif" text-anchor="end" dominant-baseline="text-before-edge">Layer z=0</text><text data-type="text" data-label="Layer z=1" data-x="0" data-y="-17.916666666666664" x="264" y="948.7666666666667" fill="black" font-size="11.2" font-family="sans-serif" text-anchor="end" dominant-baseline="text-before-edge">Layer z=1</text><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="1709" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '1709');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":22.4,"c":0,"e":264,"b":0,"d":-22.4,"f":547.4333333333334};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>